    <style>
        :root {
            --core-black: #020203;
            --panel-dark: #08080a;
            --laser-red: #ff052b;
        }

        body {
            background-color: var(--core-black);
            color: #efefef;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Тот самый "Портал", но в стиле Core */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(800px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(var(--portal-color, 255, 5, 43), 0.08) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.6s ease;
            pointer-events: none;
            z-index: -1;
        }
        body.portal-active::after { opacity: 1; }

        .brutal-font { font-family: 'Inter', sans-serif; font-weight: 900; tracking: -0.05em; }
        .tech-mono { font-family: 'Space Mono', monospace; }

        .container-box {
            max-width: 500px;
            width: 100%;
            text-align: center;
            z-index: 10;
        }

        /* Кнопки соцсетей в стиле Core Panels */
        .social-button {
            display: block;
            background: var(--panel-dark);
            border: 1px solid #15151a;
            padding: 20px 24px;
            margin-bottom: 12px;
            color: #fff;
            text-decoration: none;
            position: relative;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            overflow: hidden;
        }

        .social-button:hover {
            transform: scale(1.04) translateY(-2px);
            border-color: rgba(var(--portal-color), 0.5);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .social-button::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 3px;
            background: rgba(var(--portal-color), 1);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .social-button:hover::before { opacity: 1; }

        .btn-label {
            display: block;
            font-size: 10px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 4px;
            transition: color 0.3s;
        }
        .social-button:hover .btn-label { color: rgba(var(--portal-color), 0.8); }

        .btn-name {
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: -0.5px;
        }

        /* Специфические цвета для портала */
        .telegram-streams { --portal-rgb: 255, 5, 43; }
        .telegram-academy { --portal-rgb: 0, 136, 204; }
        .twitch { --portal-rgb: 145, 70, 255; }
        .youtube { --portal-rgb: 255, 0, 0; }
        .steam { --portal-rgb: 102, 102, 102; }

        .back-link {
            display: inline-block;
            margin-bottom: 40px;
            padding: 8px 16px;
            border: 1px solid #15151a;
            color: #555;
            font-size: 11px;
            text-transform: uppercase;
            transition: all 0.3s;
        }
        .back-link:hover {
            border-color: var(--laser-red);
            color: var(--laser-red);
        }
    </style>
</head>

<body>
    <div class="container-box">
        <header class="mb-12">
            <div class="flex items-center justify-center gap-3 mb-4">
                <span class="tech-mono text-[10px] text-red-500 bg-red-950/30 px-2 py-0.5 border border-red-900/40">COMM_HUB</span>
                <span class="tech-mono text-[10px] text-zinc-600">SECURE_LINK</span>
            </div>
            <h1 class="brutal-font text-4xl sm:text-5xl uppercase tracking-tighter text-white mb-2">
                СОЦ<span class="text-red-600">.</span>СЕТИ
            </h1>
            <div class="h-1 w-12 bg-red-600 mx-auto"></div>
        </header>

        <a href="/" class="back-link tech-mono">
            [ ← В МЕНЮ ]
        </a>

        <div class="social-buttons">
            <a href="https://t.me/kw0rs" class="social-button telegram-streams" target="_blank" data-color="255, 5, 43">
                <span class="btn-label tech-mono">Channel_01</span>
                <span class="btn-name">Telegram Стримов</span>
            </a>
            
            <a href="https://t.me/kw0rs_edu" class="social-button telegram-academy" target="_blank" data-color="0, 136, 204">
                <span class="btn-label tech-mono">Channel_02</span>
                <span class="btn-name">Telegram Академии</span>
            </a>
            
            <a href="https://www.twitch.tv/kw0rs" class="social-button twitch" target="_blank" data-color="145, 70, 255">
                <span class="btn-label tech-mono">Live_Broadcast</span>
                <span class="btn-name">Twitch</span>
            </a>
            
            <a href="https://www.youtube.com/@kw0rs" class="social-button youtube" target="_blank" data-color="255, 0, 0">
                <span class="btn-label tech-mono">Video_Archive</span>
                <span class="btn-name">YouTube</span>
            </a>
            
            <a href="https://store.steampowered.com/curator/45513934-академия-имени-вильяма/" class="social-button steam" target="_blank" data-color="102, 102, 102">
                <span class="btn-label tech-mono">Curator_Node</span>
                <span class="btn-name">Steam Академии</span>
            </a>
        </div>

        <footer class="mt-12 opacity-20 tech-mono text-[9px] uppercase tracking-[0.3em]">
            Connection established // Academy Core
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const buttons = document.querySelectorAll('.social-button');
            const body = document.body;
            
            buttons.forEach(button => {
                button.addEventListener('mouseenter', function() {
                    const color = this.getAttribute('data-color');
                    const rect = this.getBoundingClientRect();
                    const x = ((rect.left + rect.width / 2) / window.innerWidth) * 100;
                    const y = ((rect.top + rect.height / 2) / window.innerHeight) * 100;
                    
                    body.style.setProperty('--mouse-x', x + '%');
                    body.style.setProperty('--mouse-y', y + '%');
                    body.style.setProperty('--portal-color', color);
                    body.classList.add('portal-active');
                });
                
                button.addEventListener('mouseleave', function() {
                    body.classList.remove('portal-active');
                });
            });
        });
    </script>
</body>
</html>
