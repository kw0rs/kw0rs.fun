<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ТРИБУНА — CORE_v2.4</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --core-black: #020203;
            --panel-dark: #08080a;
            --laser-red: #ff052b;
        }

        body {
            background-color: var(--core-black);
            background-image: radial-gradient(circle at 50% -20%, rgba(255,5,43,0.15) 0%, transparent 60%);
            color: #efefef;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        .brutal-font { font-family: 'Inter', sans-serif; font-weight: 900; }
        .tech-mono { font-family: 'Space Mono', monospace; }
        .core-panel { background: var(--panel-dark); border: 1px solid #15151a; position: relative; }
        
        .glow-red { box-shadow: 0 0 20px rgba(255,5,43,0.15); }

        .spinning {
            animation: blurText 0.1s infinite linear;
            color: var(--laser-red);
        }

        @keyframes blurText {
            0%, 100% { filter: blur(0px); transform: scale(1); }
            50% { filter: blur(4px); transform: scale(1.05); }
        }

        .btn-laser {
            background: rgba(255,5,43,0.05);
            border: 1px solid rgba(255,5,43,0.3);
            color: var(--laser-red);
            transition: all 0.2s;
            cursor: pointer;
        }
        .btn-laser:hover:not(:disabled) {
            background: var(--laser-red);
            color: #000;
            box-shadow: 0 0 20px rgba(255,5,43,0.4);
        }
        
        .active-stage {
            border-color: var(--laser-red) !important;
            box-shadow: 0 0 15px rgba(255,5,43,0.2);
        }

        .timer-val { font-variant-numeric: tabular-nums; letter-spacing: -4px; }
    </style>
</head>
<body class="antialiased" x-data="tribuneApp()">

    <div x-show="showRules" class="fixed inset-0 z-[500] flex items-center justify-center p-4 bg-black/95 backdrop-blur-md">
        <div class="core-panel max-w-xl w-full p-8 border-red-900/50 glow-red text-center">
            <h2 class="brutal-font text-4xl text-white uppercase mb-6 tracking-tighter">Вход в систему</h2>
            <div class="text-zinc-500 tech-mono text-xs space-y-4 mb-8 text-left border-l-2 border-red-600 pl-4">
                <p>[1] Этап 1: Только скипы. Таймер 1:30.</p>
                <p>[2] Этап 2: Скипы + Рандом время.</p>
                <p>[3] Этап 3: Скипы + Время + Пол.</p>
                <p>[!] Скип тратится кнопкой "-1 SKIP".</p>
            </div>
            <button @click="showRules = false" class="w-full py-4 brutal-font text-xl btn-laser uppercase">Авторизовать</button>
        </div>
    </div>

    <div class="max-w-[1000px] mx-auto px-4 py-6 transition-all duration-500" :class="showRules ? 'blur-xl' : ''">
        
        <header class="mb-8 flex justify-between items-end border-b border-zinc-900 pb-4">
            <h1 class="brutal-font text-4xl sm:text-6xl uppercase tracking-tighter text-white">
                ТРИ<span class="text-red-600">.</span>БУ<span class="text-red-600">.</span>НА
            </h1>
            <div class="tech-mono text-[10px] text-zinc-600 text-right uppercase">
                v2.4_skips_fixed<br>ready_to_spin
            </div>
        </header>

        <div class="grid grid-cols-3 gap-2 mb-6">
            <template x-for="s in [1,2,3]">
                <button @click="setStage(s)" 
                        :class="stage === s ? 'active-stage text-white' : 'text-zinc-600 border-zinc-900'"
                        class="core-panel py-2 tech-mono text-[10px] uppercase transition-all">
                    Stage_0<span x-text="s"></span>
                </button>
            </template>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="core-panel p-6 flex flex-col items-center justify-center min-h-[180px] border-red-900/30">
                <span class="tech-mono text-[9px] text-zinc-600 absolute top-2 left-3 uppercase underline">Skips_Available</span>
                
                <div class="brutal-font text-7xl mb-2" :class="{ 'spinning': isSpinning, 'text-red-600': skipsLeft > 0, 'text-zinc-800': skipsLeft === 0 }" x-text="isSpinning ? '?' : skipsLeft"></div>
                
                <button @click="useSkip()" 
                        :disabled="isSpinning || skipsLeft <= 0"
                        class="w-full py-2 tech-mono text-[10px] uppercase border border-zinc-800 hover:border-red-600 transition-colors disabled:opacity-20">
                    [ -1 SKIP ]
                </button>
            </div>

            <div class="core-panel p-6 flex flex-col items-center justify-center min-h-[180px]" :class="stage < 2 ? 'opacity-20' : 'glow-red'">
                <span class="tech-mono text-[9px] text-zinc-600 absolute top-2 left-3 uppercase">Time_Limit</span>
                <div class="brutal-font text-3xl text-center uppercase" :class="{ 'spinning': isSpinning }" x-text="results.time"></div>
            </div>

            <div class="core-panel p-6 flex flex-col items-center justify-center min-h-[180px]" :class="stage < 3 ? 'opacity-20' : 'glow-red'">
                <span class="tech-mono text-[9px] text-zinc-600 absolute top-2 left-3 uppercase">Target_Gender</span>
                <div class="brutal-font text-xl text-center uppercase" :class="{ 'spinning': isSpinning }" x-text="results.gender"></div>
            </div>
        </div>

        <div class="core-panel p-8 mb-6 border-zinc-800 bg-[#040405] glow-red">
            <div class="flex flex-col sm:flex-row items-center justify-between gap-8">
                <div class="timer-val brutal-font text-8xl sm:text-9xl tracking-tighter"
                     :class="timeLeft < 10 && timeLeft > 0 ? 'text-red-600 animate-pulse' : 'text-white'">
                    <span x-text="formatTime(timeLeft)"></span>
                </div>
                
                <div class="flex flex-col gap-2 w-full sm:w-48">
                    <button @click="toggleTimer()" 
                            class="py-4 tech-mono text-xs uppercase border border-zinc-800 transition-all"
                            :class="isTimerRunning ? 'bg-red-900/20 text-red-500 border-red-600' : 'text-green-500 hover:bg-zinc-900'">
                        <span x-text="isTimerRunning ? '[ STOP ]' : '[ START ]'"></span>
                    </button>
                    <button @click="resetTimer()" 
                            class="py-4 tech-mono text-xs uppercase text-zinc-500 border border-zinc-800 hover:text-zinc-100 transition-all">
                        [ RESET ]
                    </button>
                </div>
            </div>
        </div>

        <button @click="spin()" 
                :disabled="isSpinning"
                class="w-full py-8 brutal-font text-3xl uppercase tracking-tighter btn-laser disabled:opacity-50">
            <span x-text="isSpinning ? 'GENERATING...' : 'КРУТИТЬ КОЛЕСО'"></span>
        </button>
    </div>

    <script>
        function tribuneApp() {
            // КОНФИГ ШАНСОВ
            const weights = {
                skips: [{ val: 1, w: 1 }, { val: 2, w: 1 }, { val: 3, w: 1 }],
                time: [
                    { val: '30 СЕК', w: 1, s: 30 },
                    { val: '1 МИН', w: 1, s: 60 },
                    { val: '1.5 МИН', w: 1, s: 90 },
                    { val: '2 МИН', w: 1, s: 120 }
                ],
                gender: [
                    { val: 'Мальчик', w: 1 },
                    { val: 'Девочка', w: 1 },
                    { val: 'Любой гендер', w: 1 }
                ]
            };

            return {
                showRules: true,
                stage: 1,
                isSpinning: false,
                skipsLeft: 0,
                results: { time: '1.5 МИН', gender: 'ВЫБОР' },
                
                timeLeft: 90,
                activeDuration: 90,
                isTimerRunning: false,
                timerInterval: null,

                setStage(s) {
                    this.stage = s;
                    this.resetTimer();
                    this.activeDuration = 90;
                    this.timeLeft = 90;
                    this.skipsLeft = 0;
                    this.results.time = '1.5 МИН';
                    this.results.gender = 'ВЫБОР';
                },

                formatTime(s) {
                    const m = Math.floor(s / 60);
                    const sec = s % 60;
                    return `${m}:${sec.toString().padStart(2, '0')}`;
                },

                useSkip() {
                    if (this.skipsLeft > 0) this.skipsLeft--;
                },

                toggleTimer() {
                    if (this.isTimerRunning) {
                        clearInterval(this.timerInterval);
                    } else {
                        if (this.timeLeft <= 0) return;
                        this.timerInterval = setInterval(() => {
                            if (this.timeLeft > 0) this.timeLeft--;
                            else { clearInterval(this.timerInterval); this.isTimerRunning = false; }
                        }, 1000);
                    }
                    this.isTimerRunning = !this.isTimerRunning;
                },

                resetTimer() {
                    clearInterval(this.timerInterval);
                    this.isTimerRunning = false;
                    this.timeLeft = this.activeDuration;
                },

                weightedRandom(items) {
                    const total = items.reduce((acc, i) => acc + i.w, 0);
                    let rand = Math.random() * total;
                    for (const i of items) {
                        if (rand < i.w) return i;
                        rand -= i.w;
                    }
                    return items[0];
                },

                async spin() {
                    this.isSpinning = true;
                    this.resetTimer();
                    
                    const anim = setInterval(() => {
                        if (this.stage >= 2) this.results.time = ['30 СЕК', '1 МИН', '2 МИН'][Math.floor(Math.random() * 3)];
                    }, 80);

                    setTimeout(() => {
                        clearInterval(anim);
                        
                        // 1. Skips Sync
                        const skipRes = this.weightedRandom(weights.skips);
                        this.skipsLeft = skipRes.val;
                        
                        // 2. Time Sync
                        if (this.stage >= 2) {
                            const res = this.weightedRandom(weights.time);
                            this.results.time = res.val;
                            this.activeDuration = res.s;
                        } else {
                            this.results.time = '1.5 МИН';
                            this.activeDuration = 90;
                        }

                        // 3. Gender
                        this.results.gender = (this.stage >= 3) ? this.weightedRandom(weights.gender).val : 'ВЫБОР';

                        this.timeLeft = this.activeDuration;
                        this.isSpinning = false;
                    }, 1200);
                }
            }
        }
    </script>
</body>
</html>
