function formatMoney(n){
  if(n>=1000) return "$"+n.toLocaleString("en-US",{minimumFractionDigits:0,maximumFractionDigits:2});
  return "$"+Number(n).toFixed(2);
}

function useCountdown(initial){
  const[sec,setSec]=useState(initial);
  useEffect(()=>{const iv=setInterval(()=>setSec(s=>s>0?s-1:0),1000);return()=>clearInterval(iv)},[]);
  return{d:Math.floor(sec/86400),h:Math.floor((sec%86400)/3600),m:Math.floor((sec%3600)/60),s:sec%60};
}

function CountdownDisplay({seconds,t,size="md"}){
  const c=useCountdown(seconds);
  const fs=size==="lg"?"clamp(24px,5vw,48px)":size==="sm"?"16px":"clamp(20px,3vw,28px)";
  const mono={fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.05em"};
  return(
    <div style={{display:"flex",alignItems:"center",gap:size==="sm"?4:8,fontSize:fs,...mono}}>
      {c.d>0&&<><span style={{color:"#e0e0e0"}}>{String(c.d).padStart(2,"0")}</span><span style={{color:"#00e5a0",opacity:.5}}>{t.days}</span><span style={{color:"#333"}}>:</span></>}
      <span style={{color:"#e0e0e0"}}>{String(c.h).padStart(2,"0")}</span><span style={{color:"#00e5a0",opacity:.5}}>{t.hours}</span><span style={{color:"#333"}}>:</span>
      <span style={{color:"#e0e0e0"}}>{String(c.m).padStart(2,"0")}</span><span style={{color:"#00e5a0",opacity:.5}}>{t.minutes}</span><span style={{color:"#333"}}>:</span>
      <span style={{color:"#e0e0e0"}}>{String(c.s).padStart(2,"0")}</span><span style={{color:"#00e5a0",opacity:.5}}>{t.seconds}</span>
    </div>
  );
}

          return(
            <div key={type} style={{marginBottom:32}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,flexWrap:"wrap"}}>
                <span style={{width:8,height:8,borderRadius:"50%",background:c.border,boxShadow:`0 0 8px ${c.border}60`}}/>
                <span style={{fontSize:13,fontWeight:700,color:c.text,letterSpacing:"0.15em",fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase"}}>{t[type]}</span>
                <span style={{fontSize:11,color:"#555",fontFamily:"'JetBrains Mono',monospace"}}>
                  {type==="bonus"&&`• ${t.fixedReward} $100 ${t.perUser} • ${t.noRollover}`}
                  {type==="daily"&&`• $5 ${t.entry.toLowerCase()} • ${t.noRollover}`}
                  {type==="weekly"&&`• $10 ${t.entry.toLowerCase()} • ${t.fullRollover}`}
                  {type==="monthly"&&`• $15 ${t.entry.toLowerCase()} • ${t.fullRollover}`}
                </span>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:16}}>
                {evs.map(ev=><EventCard key={ev.id} ev={ev} t={t} lang={lang} onClick={()=>{setSelectedEvent(ev);setPage("event-active")}}/>)}
              </div>
            </div>
          );
        })}
      </section>

      <section style={{maxWidth:1200,margin:"0 auto",padding:"0 16px 60px"}}>
        <h2 style={{fontSize:22,fontWeight:700,color:"#e0e0e0",marginBottom:28,fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.05em"}}>{t.pastEvents}</h2>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:14}}>
          {pastEvents.map(ev=><PastEventCard key={ev.id} ev={ev} t={t} lang={lang} onClick={()=>{setSelectedEvent(ev);setPage("event-closed")}}/>)}
        </div>
      </section>
    </div>
  );
}

// ─── ACTIVE EVENT PAGE ──────────────────────────────────────────
function ActiveEventPage({ev,t,lang,setPage}){
  const[guess,setGuess]=useState("");
  const[submitted,setSubmitted]=useState(false);
  const c=typeColors[ev.type];
  const handleDigit=d=>{if(guess.length<5)setGuess(g=>g+d)};
  const handleDelete=()=>setGuess(g=>g.slice(0,-1));
  const handleSubmit=()=>{if(guess!=="")setSubmitted(true)};

  return(
    <div style={{maxWidth:700,margin:"0 auto",padding:"20px 16px 80px"}}>
      <button onClick={()=>setPage("home")} style={{background:"none",border:"none",color:"#666",fontSize:14,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",marginBottom:20,padding:0}}>{t.back}</button>
      <div style={{background:`linear-gradient(135deg,${c.bg},#0d0e14)`,border:`1px solid ${c.border}22`,borderRadius:14,padding:24,marginBottom:20}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <span style={{padding:"3px 8px",borderRadius:4,fontSize:10,fontWeight:700,background:c.badge,color:c.text,letterSpacing:"0.1em",fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase"}}>{t[ev.type]}</span>
          <span style={{padding:"3px 8px",borderRadius:4,fontSize:10,background:"#00e5a015",color:"#00e5a0",fontFamily:"'JetBrains Mono',monospace"}}>{t.live}</span>
        </div>
        <h1 style={{fontSize:20,fontWeight:700,color:"#e0e0e0",marginBottom:20,lineHeight:1.4}}>{lang==="en"?ev.titleEn:ev.titleRu}</h1>
        <div style={{marginBottom:16}}>
          <span style={{fontSize:11,color:"#555"}}>{t.countdown}</span>
          <div style={{marginTop:6}}><CountdownDisplay seconds={ev.countdown} t={t} size="md"/></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:16}}>
          <div style={{background:"#0a0b0f80",borderRadius:8,padding:12}}>
            <div style={{fontSize:10,color:"#555",marginBottom:4}}>{t.participants}</div>
            <div style={{fontSize:20,fontWeight:700,color:"#e0e0e0",fontFamily:"'JetBrains Mono',monospace"}}>{ev.participants.toLocaleString()}</div>
          </div>
          <div style={{background:"#0a0b0f80",borderRadius:8,padding:12}}>
            <div style={{fontSize:10,color:"#555",marginBottom:4}}>{t.prizePool}</div>
            <div style={{fontSize:20,fontWeight:700,color:"#00e5a0",fontFamily:"'JetBrains Mono',monospace"}}>{ev.fixedReward?"$100":formatMoney(ev.pool)}</div>
          </div>
          <div style={{background:"#0a0b0f80",borderRadius:8,padding:12}}>
            <div style={{fontSize:10,color:"#555",marginBottom:4}}>{t.entry}</div>
            <div style={{fontSize:20,fontWeight:700,color:ev.entry===0?"#00e5a0":c.text,fontFamily:"'JetBrains Mono',monospace"}}>{ev.entry===0?t.free:`$${ev.entry}`}</div>
          </div>
        </div>
        <div style={{fontSize:11,color:"#444",marginBottom:8}}><span style={{color:"#555"}}>{t.source}: </span><span style={{color:c.text,textDecoration:"underline"}}>{ev.source}</span></div>
        <div style={{fontSize:11,color:"#444"}}>{t.transparency}</div>
      </div>

      {!submitted?(
        <div style={{background:"#0d0e14",border:"1px solid #1a1b23",borderRadius:14,padding:24,textAlign:"center"}}>
          <div style={{fontSize:12,color:"#666",marginBottom:6}}>{t.enterExact}</div>
          <div style={{fontSize:11,color:"#444",marginBottom:20}}>{t.allowedRange}: {ev.range[0]}–{ev.range[1]}</div>
          <div style={{fontSize:"clamp(40px,8vw,64px)",fontWeight:800,color:guess?"#fff":"#333",fontFamily:"'JetBrains Mono',monospace",minHeight:80,display:"flex",alignItems:"center",justifyContent:"center",borderBottom:`2px solid ${guess?c.border:"#1a1b23"}`,marginBottom:24,paddingBottom:8,transition:"all .2s"}}>{guess||"—"}</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,maxWidth:280,margin:"0 auto 20px"}}>
            {[1,2,3,4,5,6,7,8,9,null,0,"del"].map((d,i)=>{
              if(d===null)return <div key={i}/>;
              return <button key={i} onClick={()=>d==="del"?handleDelete():handleDigit(String(d))} style={{padding:"14px 0",borderRadius:8,fontSize:22,fontWeight:600,background:d==="del"?"#1a0e0e":"#111218",color:d==="del"?"#f74d4d":"#e0e0e0",border:"1px solid #1a1b23",cursor:"pointer",fontFamily:"'JetBrains Mono',monospace"}}>{d==="del"?"⌫":d}</button>;
            })}
          </div>
          <button onClick={handleSubmit} disabled={!guess} style={{width:"100%",maxWidth:280,padding:"14px 0",borderRadius:8,fontSize:14,fontWeight:700,background:guess?`linear-gradient(135deg,${c.border},${c.border}cc)`:"#1a1b23",color:guess?"#0a0b0f":"#444",border:"none",cursor:guess?"pointer":"default",fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.05em",boxShadow:guess?`0 4px 20px ${c.border}40`:"none"}}>{t.confirmEntry}{ev.entry>0?` — $${ev.entry}`:""}</button>
        </div>
      ):(
        <div style={{background:"#0d0e14",border:`1px solid ${c.border}33`,borderRadius:14,padding:32,textAlign:"center"}}>
          <div style={{fontSize:12,color:"#666",marginBottom:8}}>{t.yourGuess}</div>
          <div style={{fontSize:56,fontWeight:800,color:c.text,fontFamily:"'JetBrains Mono',monospace",marginBottom:16}}>{guess}</div>
          <div style={{fontSize:13,color:"#555",padding:"12px 20px",background:"#0a0b0f",borderRadius:8}}>{t.resultsAfter}</div>
        </div>
      )}
    </div>
  );
}

// ─── CLOSED EVENT PAGE ──────────────────────────────────────────
function ClosedEventPage({ev,t,lang,setPage}){
  const c=typeColors[ev.type];
  const nw=ev.winners===0;
  const dist=closedEventData.distribution;
  const maxE=Math.max(...dist.map(r=>r.entries));

  return(
    <div style={{maxWidth:700,margin:"0 auto",padding:"20px 16px 80px"}}>
      <button onClick={()=>setPage("home")} style={{background:"none",border:"none",color:"#666",fontSize:14,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",marginBottom:20,padding:0}}>{t.back}</button>
      <div style={{background:`linear-gradient(135deg,${c.bg},#0d0e14)`,border:`1px solid ${c.border}22`,borderRadius:14,padding:24,marginBottom:20}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <span style={{padding:"3px 8px",borderRadius:4,fontSize:10,fontWeight:700,background:c.badge,color:c.text,letterSpacing:"0.1em",fontFamily:"'JetBrains Mono',monospace",textTransform:"uppercase"}}>{t[ev.type]}</span>
          <span style={{padding:"2px 6px",borderRadius:4,fontSize:9,background:"#ffffff08",color:"#666",fontFamily:"'JetBrains Mono',monospace"}}>{t.closed}</span>
        </div>
        <h1 style={{fontSize:20,fontWeight:700,color:"#e0e0e0",marginBottom:24,lineHeight:1.4}}>{lang==="en"?ev.titleEn:ev.titleRu}</h1>
        <div style={{textAlign:"center",padding:24,background:"#0a0b0f",borderRadius:12,marginBottom:20,border:"1px solid #00e5a022"}}>
          <div style={{fontSize:12,color:"#00e5a0",letterSpacing:"0.2em",fontFamily:"'JetBrains Mono',monospace",marginBottom:8}}>{t.finalResult}</div>
          <div style={{fontSize:64,fontWeight:800,color:"#00e5a0",fontFamily:"'JetBrains Mono',monospace",lineHeight:1,textShadow:"0 0 40px #00e5a020"}}>{ev.result}</div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {[
            {label:t.totalParticipants,value:ev.participants.toLocaleString(),color:"#e0e0e0"},
            {label:t.totalPool,value:formatMoney(ev.pool),color:"#e0e0e0"},
            {label:t.winners,value:nw?"0":String(ev.winners),color:nw?"#f74d4d":"#00e5a0"},
            {label:t.payoutPerWinner,value:nw?"—":formatMoney(ev.payoutPerWinner),color:nw?"#f74d4d":"#00e5a0"},
          ].map((s,i)=>(
            <div key={i} style={{background:"#0a0b0f80",borderRadius:8,padding:12}}>
              <div style={{fontSize:10,color:"#555",marginBottom:4}}>{s.label}</div>
              <div style={{fontSize:20,fontWeight:700,color:s.color,fontFamily:"'JetBrains Mono',monospace"}}>{s.value}</div>
            </div>
          ))}
        </div>
        {nw&&<div style={{marginTop:14,padding:"10px 16px",borderRadius:8,background:"#f74d4d10",border:"1px solid #f74d4d22",fontSize:13,color:"#f74d4d",textAlign:"center",fontFamily:"'JetBrains Mono',monospace"}}>{t.noWinners}</div>}
      </div>

      <div style={{background:"#0d0e14",border:"1px solid #1a1b23",borderRadius:14,padding:24}}>
        <h3 style={{fontSize:14,fontWeight:700,color:"#888",marginBottom:16,fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.1em"}}>{t.distribution}</h3>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead>
              <tr>
                <th style={{textAlign:"left",padding:"8px 12px",fontSize:11,color:"#555",borderBottom:"1px solid #1a1b23",fontFamily:"'JetBrains Mono',monospace"}}>{t.number}</th>
                <th style={{textAlign:"right",padding:"8px 12px",fontSize:11,color:"#555",borderBottom:"1px solid #1a1b23",fontFamily:"'JetBrains Mono',monospace"}}>{t.totalEntries}</th>
                <th style={{textAlign:"right",padding:"8px 12px",fontSize:11,color:"#555",borderBottom:"1px solid #1a1b23"}}></th>
              </tr>
            </thead>
            <tbody>
              {dist.map(row=>{
                const isW=row.num===ev.result;
                const bw=(row.entries/maxE)*100;
                return(
                  <tr key={row.num} style={{background:isW?"#00e5a008":"transparent"}}>
                    <td style={{padding:"10px 12px",fontSize:15,fontWeight:isW?800:500,color:isW?"#00e5a0":"#aaa",fontFamily:"'JetBrains Mono',monospace",borderBottom:"1px solid #0a0b0f"}}>{row.num}{isW&&" ✓"}</td>
                    <td style={{padding:"10px 12px",fontSize:14,fontWeight:isW?700:400,color:isW?"#00e5a0":"#777",fontFamily:"'JetBrains Mono',monospace",textAlign:"right",borderBottom:"1px solid #0a0b0f"}}>{row.entries}</td>
                    <td style={{padding:"10px 12px",borderBottom:"1px solid #0a0b0f",width:"40%"}}><div style={{height:6,borderRadius:3,background:isW?"#00e5a0":"#1a1b23",width:`${bw}%`}}/></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ─── PROFILE PAGE ───────────────────────────────────────────────
function ProfilePage({t,lang,setPage}){
  const p=profileData;
  const sc={won:"#00e5a0",lost:"#f74d4d",pending:"#f7b94d"};
  return(
    <div style={{maxWidth:700,margin:"0 auto",padding:"20px 16px 80px"}}>
      <button onClick={()=>setPage("home")} style={{background:"none",border:"none",color:"#666",fontSize:14,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",marginBottom:20,padding:0}}>{t.back}</button>
      <h1 style={{fontSize:24,fontWeight:700,color:"#e0e0e0",marginBottom:24,fontFamily:"'JetBrains Mono',monospace"}}>{t.profilePage}</h1>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:12,marginBottom:28}}>
        {[
          {label:t.balance,value:formatMoney(p.balance),color:"#e0e0e0"},
          {label:t.totalWinnings,value:formatMoney(p.totalWinnings),color:"#00e5a0"},
          {label:t.totalLosses,value:formatMoney(p.totalLosses),color:"#f74d4d"},
          {label:t.winRate,value:p.winRate+"%",color:"#f7b94d"},
          {label:t.activeEntries,value:String(p.activeEntries),color:"#c06df7"},
        ].map((s,i)=>(
          <div key={i} style={{background:"#0d0e14",border:"1px solid #1a1b23",borderRadius:10,padding:16}}>
            <div style={{fontSize:10,color:"#555",marginBottom:6,fontFamily:"'JetBrains Mono',monospace"}}>{s.label}</div>
            <div style={{fontSize:22,fontWeight:700,color:s.color,fontFamily:"'JetBrains Mono',monospace"}}>{s.value}</div>
          </div>
        ))}
      </div>
      <h2 style={{fontSize:16,fontWeight:700,color:"#888",marginBottom:16,fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.1em"}}>{t.history}</h2>
      <div style={{background:"#0d0e14",border:"1px solid #1a1b23",borderRadius:12,overflow:"hidden"}}>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",minWidth:550}}>
            <thead>
              <tr>
                {[t.event,t.yourGuessCol,t.resultCol,t.status,t.payout].map((h,i)=>(
                  <th key={i} style={{textAlign:i===0?"left":"center",padding:"12px 14px",fontSize:11,color:"#444",borderBottom:"1px solid #1a1b23",fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {p.history.map((h,i)=>(
                <tr key={i} style={{borderBottom:"1px solid #0a0b0f"}}>
                  <td style={{padding:"12px 14px",fontSize:13,color:"#aaa"}}>{h.event}</td>
                  <td style={{padding:"12px 14px",fontSize:14,color:"#e0e0e0",textAlign:"center",fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>{h.guess??"\u2014"}</td>
                  <td style={{padding:"12px 14px",fontSize:14,color:"#e0e0e0",textAlign:"center",fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>{h.result??"\u2014"}</td>
                  <td style={{padding:"12px 14px",textAlign:"center"}}><span style={{padding:"3px 8px",borderRadius:4,fontSize:10,fontWeight:700,background:sc[h.status]+"18",color:sc[h.status],fontFamily:"'JetBrains Mono',monospace"}}>{t[h.status]}</span></td>
                  <td style={{padding:"12px 14px",fontSize:14,textAlign:"center",color:h.payout>0?"#00e5a0":"#555",fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>{h.payout!=null?(h.payout>0?formatMoney(h.payout):"$0"):"\u2014"}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ─── BOTTOM NAV ─────────────────────────────────────────────────
function BottomNav({page,setPage,t}){
  return(
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#0a0b0f",borderTop:"1px solid #1a1b23",display:"flex",justifyContent:"center",gap:32,padding:"10px 0",paddingBottom:"max(10px, env(safe-area-inset-bottom))",zIndex:50}}>
      {[{key:"home",label:t.home,icon:"⌂"},{key:"profile",label:t.profile,icon:"👤"}].map(it=>(
        <button key={it.key} onClick={()=>setPage(it.key)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:page===it.key?"#00e5a0":"#555",fontSize:18}}>
          <span>{it.icon}</span>
          <span style={{fontSize:10,fontFamily:"'JetBrains Mono',monospace"}}>{it.label}</span>
        </button>
      ))}
    </div>
  );
}

// ─── MAIN APP ───────────────────────────────────────────────────
function App(){
  const[lang,setLang]=useState("en");
  const[page,setPage]=useState("home");
  const[selectedEvent,setSelectedEvent]=useState(null);
  const t=T[lang];
  return(
    <div style={{minHeight:"100vh",background:"#0a0b0f",color:"#e0e0e0",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"}}>
      <Header lang={lang} setLang={setLang} t={t} setPage={setPage}/>
      <main style={{paddingBottom:70}}>
        {page==="home"&&<HomePage t={t} lang={lang} setPage={setPage} setSelectedEvent={setSelectedEvent}/>}
        {page==="event-active"&&selectedEvent&&<ActiveEventPage ev={selectedEvent} t={t} lang={lang} setPage={setPage}/>}
        {page==="event-closed"&&selectedEvent&&<ClosedEventPage ev={selectedEvent} t={t} lang={lang} setPage={setPage}/>}
        {page==="profile"&&<ProfilePage t={t} lang={lang} setPage={setPage}/>}
      </main>
      <BottomNav page={page} setPage={setPage} t={t}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
