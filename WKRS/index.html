<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>К.А.Л - Кворс Аниме Лист // CORE</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --core-black: #020203;
            --panel-dark: #08080a;
            --laser-red: #ff052b;
            --dark-crimson: #5c000d;
        }

        body {
            background-color: var(--core-black);
            background-image: 
                radial-gradient(circle at 50% -20%, rgba(255, 5, 43, 0.12) 0%, transparent 60%);
            color: #efefef;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .brutal-font { font-family: 'Inter', sans-serif; font-weight: 900; tracking: -0.05em; }
        .tech-mono { font-family: 'Space Mono', monospace; }

        .text-block {
            font-size: 1rem;
            line-height: 1.7;
            color: #e2e8f0;
        }

        .core-panel {
            background: var(--panel-dark);
            border: 1px solid #15151a;
        }

        /* 🛠️ ЖЁСТКИЙ ФИКС МАСШТАБИРОВАНИЯ ДЛЯ ВСЕХ КАРТОЧЕК БЕЗ ИСКЛЮЧЕНИЯ */
        .card-monolith {
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), border-color 0.3s ease, box-shadow 0.3s ease !important;
        }
        .card-monolith:hover {
            transform: translateY(-6px) scale(1.03) !important;
            z-index: 30;
        }

        /* 👑 ТИР 10/10 */
        .tier-10 {
            border: 2px solid var(--laser-red) !important;
            box-shadow: 0 0 25px rgba(255, 5, 43, 0.25), inset 0 0 15px rgba(255, 5, 43, 0.1) !important;
        }
        .tier-10::before {
            content: 'TOP_VERDICT';
            position: absolute;
            top: -10px;
            left: 10px;
            background: var(--laser-red);
            color: #000;
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            font-weight: 900;
            padding: 0 6px;
            z-index: 20;
        }
        .tier-10:hover {
            box-shadow: 0 0 35px rgba(255, 5, 43, 0.5) !important;
        }

        /* 🌌 ТИР 11/10 и 12/10 */
        .tier-mega {
            border: 2px solid transparent !important;
            background-image: linear-gradient(var(--panel-dark), var(--panel-dark)), 
                              linear-gradient(90deg, #ff052b, #200005, #ff052b) !important;
            background-origin: border-box !important;
            background-clip: padding-box, border-box !important;
            background-size: 200% 100% !important;
            animation: laserShift 3s linear infinite !important;
            box-shadow: 0 0 35px rgba(255, 5, 43, 0.4) !important;
        }
        .tier-mega::before {
            content: 'OVERLOAD_11+';
            position: absolute;
            top: -10px;
            left: 10px;
            background: #fff;
            color: #000;
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            font-weight: 900;
            padding: 0 6px;
            z-index: 20;
            animation: pulseBlink 1s infinite;
        }
        .tier-mega:hover {
            box-shadow: 0 0 50px rgba(255, 5, 43, 0.7) !important;
        }

        @keyframes laserShift {
            0% { background-position: 0% 0%; }
            100% { background-position: 200% 0%; }
        }
        @keyframes pulseBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--core-black); }
        ::-webkit-scrollbar-thumb { background: #222; }
        ::-webkit-scrollbar-thumb:hover { background: var(--laser-red); }
    </style>
</head>
<body class="antialiased" x-data="mediaApp()" x-init="loadItems()">

    <div class="max-w-[1600px] mx-auto px-6 py-12">
        
        <!-- HEADER -->
        <header class="mb-16 flex flex-col lg:flex-row justify-between items-start lg:items-end gap-6 pb-8 border-b-2 border-[#111]">
            <div>
                <div class="flex items-center gap-3 mb-3">
                    <span class="tech-mono text-xs text-red-500 bg-red-950/50 px-2 py-0.5 border border-red-900/40">SYS_V2.6</span>
                    <span class="tech-mono text-xs text-zinc-600">SECURE_CHANNEL</span>
                </div>
                <!-- Возврат легендарного названия -->
                <h1 class="brutal-font text-4xl sm:text-6xl uppercase tracking-tighter text-white">
                    К.А.Л <span class="text-red-600">-</span> КВОРС АНИМЕ ЛИСТ
                </h1>
            </div>
            
            <div class="flex gap-8 tech-mono text-xs bg-[#0a0a0d] p-4 border border-[#15151a]">
                <div>TOTAL_UNITS: <span class="text-white font-bold" x-text="items.length"></span></div>
                <div class="text-red-600">//</div>
                <div>FILTERED: <span class="text-red-500 font-bold" x-text="filteredAndSortedItems.length"></span></div>
            </div>
        </header>

        <!-- УПРАВЛЕНИЕ АРХИВОМ -->
        <section class="mb-12 core-panel p-6 sm:p-8">
            <div class="grid grid-cols-1 xl:grid-cols-4 gap-6">
                <!-- Поиск -->
                <div class="xl:col-span-2">
                    <label class="tech-mono text-[11px] text-zinc-500 uppercase mb-2 block">01 / Ключ_Поиска</label>
                    <input type="text" x-model="search" placeholder="Введи название тайтла..." 
                           class="w-full bg-[#030304] border border-[#1a1a22] p-3 text-white focus:outline-none focus:border-red-600 transition-colors">
                </div>

                <!-- Категория -->
                <div>
                    <label class="tech-mono text-[11px] text-zinc-500 uppercase mb-2 block">02 / Сектор</label>
                    <select x-model="categoryFilter" class="w-full bg-[#030304] border border-[#1a1a22] p-3 text-white focus:outline-none focus:border-red-600 cursor-pointer">
                        <option value="">ВСЕ КАТЕГОРИИ</option>
                        <option value="movie">КИНО</option>
                        <option value="show">СЕРИАЛЫ</option>
                        <option value="anime">АНИМЕ</option>
                        <option value="game">ИГРЫ</option>
                        <option value="book">КНИГИ</option>
                    </select>
                </div>

                <!-- Сортировка (Двухсторонняя) -->
                <div>
                    <label class="tech-mono text-[11px] text-zinc-500 uppercase mb-2 block">03 / Вектор_Сортировки</label>
                    <select x-model="sortKey" class="w-full bg-[#030304] border border-[#1a1a22] p-3 text-white focus:outline-none focus:border-red-600 cursor-pointer">
                        <option value="rating-desc">РЕЙТИНГ [ОТ ВЫСШИХ К НИЗШИМ]</option>
                        <option value="rating-asc">РЕЙТИНГ [ОТ НИЗШИХ К ВЫСШИХ]</option>
                        <option value="year-desc">ХРОНОЛОГИЯ [СНАЧАЛА НОВЫЕ]</option>
                        <option value="year-asc">ХРОНОЛОГИЯ [СНАЧАЛА СТАРЫЕ]</option>
                        <option value="title-asc">АЛФАВИТ [А → Я]</option>
                        <option value="title-desc">АЛФАВИТ [Я → А]</option>
                    </select>
                </div>
            </div>

            <div class="mt-6 pt-6 border-t border-zinc-900 flex justify-between items-center flex-wrap gap-4">
                <div class="flex items-center gap-3">
                    <span class="tech-mono text-[11px] text-zinc-500">MIN_SCORE:</span>
                    <input type="range" x-model.number="minRating" min="0" max="10" step="1" class="accent-red-600 bg-zinc-900 h-1 w-32">
                    <span class="tech-mono text-sm text-red-500 font-bold" x-text="minRating"></span>
                </div>
                
                <div class="flex gap-4">
                    <button @click="pickRandomItem()" class="tech-mono text-xs bg-red-950/30 hover:bg-red-900/40 text-red-500 border border-red-900/50 px-5 py-2.5 transition-colors">
                        [СЛУЧАЙНЫЙ_ВЫБОР]
                    </button>
                    <button @click="clearFilters()" class="tech-mono text-xs text-zinc-500 hover:text-white px-3 py-2 transition-colors">
                        Сбросить
                    </button>
                </div>
            </div>

            <!-- РЕЕСТР КАРТОЧЕК -->
            <main class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6 mt-12">
                <template x-for="item in filteredAndSortedItems" :key="item.title">
                    <article @click="openModal(item)" 
                             :class="getCardTierClass(item.rating)" 
                             class="core-panel card-monolith p-2 rounded-none hover:border-zinc-500 transition-all cursor-pointer group flex flex-col h-full relative">
                        
                        <!-- Обложка или Заглушка -->
                        <div class="relative aspect-[2/3] bg-black overflow-hidden mb-3 flex items-center justify-center">
                            <template x-if="item.image">
                                <img :src="item.image" class="w-full h-full object-cover grayscale-[30%] group-hover:grayscale-0 transition-transform duration-500" loading="lazy">
                            </template>
                            
                            <!-- Заглушка для пустых картинок -->
                            <template x-if="!item.image">
                                <div class="w-full h-full flex flex-col items-center justify-center bg-zinc-950 p-4 text-center border border-dashed border-zinc-800 text-zinc-600 font-mono text-[10px] uppercase tracking-wider select-none">
                                    <span class="text-lg mb-1">✕</span>
                                    <span>Постер временно<br>отсутствует</span>
                                </div>
                            </template>
                            
                            <!-- Оценка строго в формате Х/10 -->
                            <div class="absolute top-2 right-2 bg-black/90 px-2 py-0.5 border text-[11px] font-bold tech-mono"
                                 :class="item.rating >= 10 ? 'text-red-500 border-red-900' : 'text-white border-zinc-800'">
                                <span x-text="item.rating ? item.rating.toFixed(1) + '/10' : 'Н/Д'"></span>
                            </div>
                        </div>

                        <!-- Инфо -->
                        <div class="flex flex-col flex-1 px-1">
                            <span class="tech-mono text-[9px] text-zinc-600 uppercase mb-1" x-text="item.typeDisplay"></span>
                            <h3 class="text-sm font-bold text-zinc-100 group-hover:text-red-500 transition-colors line-clamp-2 uppercase tracking-tight mb-2" x-text="item.title"></h3>
                            
                            <div class="mt-auto pt-2 border-t border-[#15151a] flex justify-between text-[11px] tech-mono text-zinc-500">
                                <span x-text="item.year"></span>
                                <span class="truncate max-w-[80px]" x-text="item.genres[0] || ''"></span>
                            </div>
                        </div>
                    </article>
                </template>
            </main>

            <!-- Пустой экран -->
            <div x-show="filteredAndSortedItems.length === 0" class="text-center py-20 border border-dashed border-[#15151a] mt-12">
                <p class="tech-mono text-xs text-zinc-600 uppercase tracking-widest mb-4">РЕЗУЛЬТАТЫ НЕ ОБНАРУЖЕНЫ</p>
                <button @click="clearFilters()" class="text-xs tech-mono text-red-500 hover:underline">[ СБРОСИТЬ СИСТЕМУ ФИЛЬТРОВ ]</button>
            </div>

            <!-- СИСТЕМНАЯ МОДАЛКА -->
            <div x-show="modalItem" 
                 class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/95 backdrop-blur-md"
                 x-transition:enter="transition ease-out duration-200"
                 x-transition:enter-start="opacity-0"
                 style="display: none;">
                
                <div class="bg-[#08080a] border border-[#1c1c24] w-full max-w-5xl rounded-none flex flex-col md:flex-row max-h-[90vh]"
                     @click.away="closeModal()">
                    
                    <!-- Лево: Постер -->
                    <div class="w-full md:w-2/5 bg-black p-6 border-b md:border-b-0 md:border-r border-[#15151a] flex flex-col justify-center">
                        <div class="relative aspect-[2/3] w-full bg-zinc-950 flex items-center justify-center">
                            <template x-if="modalItem?.image">
                                <img :src="modalItem?.image" class="w-full h-full object-cover border border-[#15151a] shadow-2xl">
                            </template>
                            <template x-if="!modalItem?.image">
                                <div class="w-full h-full flex flex-col items-center justify-center text-center p-6 text-zinc-600 font-mono text-xs uppercase tracking-widest border border-dashed border-zinc-800">
                                    <span class="text-2xl mb-2">✕</span>
                                    <span>Постер временно<br>отсутствует</span>
                                </div>
                            </template>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-2 tech-mono text-center mt-4">
                            <div class="bg-[#030304] p-3 border border-[#15151a]">
                                <span class="text-[9px] text-zinc-600 block uppercase">VERDICT</span>
                                <span class="text-xl font-bold text-red-500" x-text="modalItem?.rating ? modalItem.rating.toFixed(1) + '/10' : 'Н/Д'"></span>
                            </div>
                            <div class="bg-[#030304] p-3 border border-[#15151a]">
                                <span class="text-[9px] text-zinc-600 block uppercase">YEAR</span>
                                <span class="text-xl font-bold text-white" x-text="modalItem?.year"></span>
                            </div>
                        </div>
                    </div>

                    <!-- Право: Контент -->
                    <div class="flex-1 p-6 sm:p-10 overflow-y-auto flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start gap-4 mb-6">
                                <div>
                                    <span class="tech-mono text-xs text-red-500 uppercase font-bold" x-text="modalItem?.typeDisplay"></span>
                                    <h2 class="brutal-font text-3xl sm:text-5xl text-white uppercase tracking-tighter mt-1" x-text="modalItem?.title"></h2>
                                </div>
                                <button @click="closeModal()" class="tech-mono text-zinc-500 hover:text-white text-xs bg-[#030304] px-3 py-1.5 border border-[#15151a]">CLOSE_×</button>
                            </div>

                            <!-- Табы -->
                            <div class="flex border-b border-[#15151a] mb-6">
                                <button @click="showReview = true" 
                                        class="px-4 py-2.5 tech-mono text-xs uppercase tracking-wider border-b-2 transition-all"
                                        :class="showReview ? 'border-red-600 text-white font-bold bg-red-950/20' : 'border-transparent text-zinc-500 hover:text-white'">
                                    [ Мнение_Рецензия ]
                                </button>
                                <button @click="showReview = false" 
                                        class="px-4 py-2.5 tech-mono text-xs uppercase tracking-wider border-b-2 transition-all"
                                        :class="!showReview ? 'border-red-600 text-white font-bold bg-red-950/20' : 'border-transparent text-zinc-500 hover:text-white'">
                                    [ Инфо_Описание ]
                                </button>
                            </div>

                            <!-- Текстовый блок -->
                            <div class="text-block">
                                <div x-show="showReview">
                                    <p class="whitespace-pre-line text-zinc-100 italic font-medium" x-text="modalItem?.review || 'Рецензия еще не занесена в ядро базы данных.'"></p>
                                </div>
                                <div x-show="!showReview">
                                    <p class="text-zinc-400" x-text="modalItem?.description || 'Сюжетное описание отсутствует.'"></p>
                                </div>
                            </div>
                        </div>

                        <div class="mt-8 flex flex-wrap gap-2">
                            <template x-for="genre in modalItem?.genres" :key="genre">
                                <span class="text-xs tech-mono bg-[#030304] px-3 py-1.5 text-zinc-400 border border-[#15151a]" x-text="genre"></span>
                            </template>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Системный Загрузчик -->
            <div x-show="loading" class="fixed inset-0 bg-[#020203] z-[100] flex flex-col items-center justify-center gap-3">
                <div class="h-1 w-48 bg-zinc-900 overflow-hidden relative">
                    <div class="absolute h-full bg-red-600 top-0 left-0 animate-[loadingBar_1.5s_infinite]" style="width: 30%"></div>
                </div>
                <p class="tech-mono text-[10px] text-red-500 tracking-widest uppercase">LOADING_CORE_DATA...</p>
            </div>
        </section>
    </div>

    <script>
        function mediaApp() {
            return {
                search: '',
                categoryFilter: '',
                sortKey: 'rating-desc',
                minRating: 0,
                modalItem: null,
                items: [],
                loading: true,
                showReview: true,

                async loadItems() {
                    const files = ['anime_data.json', 'movies_data.json', 'games_data.json', 'books_data.json', 'cartoons_data.json'];
                    try {
                        const results = await Promise.all(files.map(f => fetch(f).then(r => r.ok ? r.json() : []).catch(() => [])));
                        this.items = results.flat().map(item => ({
                            ...item,
                            rating: parseFloat(item.rating) || 0,
                            typeDisplay: this.getType(item.type)
                        }));
                    } finally {
                        this.loading = false;
                    }
                },

                getType(t) {
                    const m = { 'movie': 'CINEMA', 'show': 'SERIES', 'anime': 'ANIME', 'game': 'GAME', 'book': 'LITERATURE', 'cartoon': 'CARTOON' };
                    return m[t] || 'RECORD';
                },

                getCardTierClass(rating) {
                    if (rating === 10) return 'tier-10';
                    if (rating > 10) return 'tier-mega';
                    return '';
                },

                get filteredAndSortedItems() {
                    let f = this.items.filter(i => {
                        return (!this.search || i.title.toLowerCase().includes(this.search.toLowerCase())) &&
                               (!this.categoryFilter || i.type === this.categoryFilter) &&
                               (!this.minRating || i.rating >= this.minRating);
                    });

                    // Полноценная двухсторонняя сортировка по всем параметрам
                    return f.sort((a, b) => {
                        const rA = a.rating === null ? -1 : a.rating;
                        const rB = b.rating === null ? -1 : b.rating;
                        
                        switch (this.sortKey) {
                            case 'rating-asc':   return rA - rB;
                            case 'rating-desc':  return rB - rA;
                            case 'year-asc':     return (parseInt(a.year) || 0) - (parseInt(b.year) || 0);
                            case 'year-desc':    return (parseInt(b.year) || 0) - (parseInt(a.year) || 0);
                            case 'title-asc':    return a.title.localeCompare(b.title, 'ru');
                            case 'title-desc':   return b.title.localeCompare(a.title, 'ru');
                            default:             return 0;
                        }
                    });
                },

                openModal(item) { this.modalItem = item; this.showReview = !!item.review; document.body.style.overflow = 'hidden'; },
                closeModal() { this.modalItem = null; document.body.style.overflow = ''; },
                clearFilters() { this.search = ''; this.categoryFilter = ''; this.sortKey = 'rating-desc'; this.minRating = 0; },
                pickRandomItem() {
                    const l = this.filteredAndSortedItems;
                    if (l.length) this.openModal(l[Math.floor(Math.random() * l.length)]);
                }
            }
        }
    </script>
</body>
</html>
