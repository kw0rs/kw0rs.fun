<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KW0RS // RED_ARCHIVE // S.E.M.Y.O.N.</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Metamorphous&family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

    <style>
        :root {
            --blood-red: #8b0000;
            --pure-red: #ff0000;
            --obsidian: #050505;
            --slate-gray: #1a1a1a;
        }

        body {
            background-color: var(--obsidian);
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.9), rgba(0, 0, 0, 0.9)),
                url("https://www.transparenttextures.com/patterns/asfalt-dark.png");
            color: #d1d1d1;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .gothic-font { font-family: 'Metamorphous', serif; }
        .mono-tech { font-family: 'JetBrains Mono', monospace; }

        /* Читаемые тексты */
        .readable-text {
            line-height: 1.6;
            letter-spacing: 0.02em;
        }

        /* Обычная карточка (Мрачный обсидиан) */
        .vault-card {
            background: #0a0a0a;
            border: 1px solid #222;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .vault-card:hover {
            border-color: var(--blood-red);
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        }

        /* 🩸 ТИР 10/10 — КРОВАВОЕ КЛЕЙМО */
        .tier-10 {
            border: 2px solid var(--blood-red) !important;
            box-shadow: 0 0 15px rgba(139, 0, 0, 0.4), inset 0 0 10px rgba(139, 0, 0, 0.2) !important;
        }
        .tier-10:hover {
            border-color: var(--pure-red) !important;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.6) !important;
        }

        /* 💀 ТИР 11/10 и 12/10 — АДСКИЙ РАЗЛОМ (ЖИВАЯ ПЛАЗМА) */
        .tier-mega {
            border: 2px solid transparent !important;
            background-image: linear-gradient(#0a0a0a, #0a0a0a), 
                              linear-gradient(90deg, #300, #f00, #600, #f00, #300) !important;
            background-origin: border-box !important;
            background-clip: padding-box, border-box !important;
            background-size: 200% 100% !important;
            animation: bloodFlow 3s linear infinite !important;
            filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.3));
        }
        .tier-mega:hover {
            transform: translateY(-10px) !important;
            filter: drop-shadow(0 0 25px rgba(255, 0, 0, 0.7)) !important;
        }
        @keyframes bloodFlow {
            0% { background-position: 0% 50%, 0% 0%; }
            100% { background-position: 0% 50%, 200% 0%; }
        }

        /* Скроллбар */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--obsidian); }
        ::-webkit-scrollbar-thumb { background: var(--blood-red); border-radius: 0; }

        /* Кастомный инпут */
        .red-input {
            background: #0f0f0f;
            border: 1px solid #222;
            color: #fff;
            transition: 0.3s;
        }
        .red-input:focus {
            border-color: var(--pure-red);
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.2);
            outline: none;
        }
    </style>
</head>
<body class="antialiased" x-data="mediaApp()" x-init="loadItems()">

    <div class="fixed inset-0 pointer-events-none opacity-[0.05] z-50 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')]"></div>

    <div class="max-w-[1440px] mx-auto px-6 py-10 relative z-10">
        
        <header class="mb-16 border-l-8 border-red-700 pl-8 py-4">
            <h1 class="gothic-font text-5xl md:text-7xl font-black text-white tracking-tighter uppercase mb-2">
                REDACTED <span class="text-red-600">//</span> ARCHIVE
            </h1>
            <div class="flex items-center gap-4 text-xs mono-tech uppercase text-zinc-500 tracking-[0.3em]">
                <span>Log_Subject: Semyon</span>
                <span class="text-red-800">●</span>
                <span>Security: High_Inquisition</span>
            </div>
        </header>

        <section class="mb-12 bg-zinc-900/30 p-8 rounded border border-zinc-800/50 backdrop-blur-md">
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
                <div class="lg:col-span-2">
                    <label class="mono-tech text-[10px] text-red-600 font-bold mb-2 block uppercase tracking-widest">Entry_Identifier</label>
                    <input type="text" x-model="search" placeholder="Поиск по архиву..." class="red-input w-full p-3 gothic-font text-lg tracking-wide">
                </div>

                <div>
                    <label class="mono-tech text-[10px] text-zinc-500 mb-2 block uppercase tracking-widest">Classification</label>
                    <select x-model="categoryFilter" class="red-input w-full p-3 text-sm mono-tech cursor-pointer">
                        <option value="">ALL_RECORDS</option>
                        <option value="movie">CINEMA</option>
                        <option value="show">SERIES</option>
                        <option value="anime">ANIME</option>
                        <option value="game">ARTIFACTS (GAMES)</option>
                        <option value="book">SCROLLS (BOOKS)</option>
                    </select>
                </div>

                <div>
                    <label class="mono-tech text-[10px] text-zinc-500 mb-2 block uppercase tracking-widest">Priority_Order</label>
                    <select x-model="sortKey" class="red-input w-full p-3 text-sm mono-tech cursor-pointer">
                        <option value="rating-desc">VERDICT (DESC)</option>
                        <option value="year-desc">CHRONOLOGY (NEW)</option>
                        <option value="title">ALPHABETICAL (A-Z)</option>
                    </select>
                </div>
            </div>
        </section>

        <main class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
            <template x-for="item in filteredAndSortedItems" :key="item.title">
                <article @click="openModal(item)" 
                         :class="getCardTierClass(item.rating)" 
                         class="vault-card group rounded-sm overflow-hidden flex flex-col h-full cursor-pointer">
                    
                    <div class="relative aspect-[2/3] bg-zinc-950 overflow-hidden">
                        <img :src="item.image || 'https://via.placeholder.com/400x600?text=NO_SIGNAL'" 
                             class="w-full h-full object-cover transition-all duration-700 group-hover:scale-110 grayscale-[60%] group-hover:grayscale-0 group-hover:brightness-110"
                             loading="lazy">
                        
                        <div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-black to-transparent p-4">
                            <span class="gothic-font text-3xl font-black" 
                                  :class="item.rating >= 10 ? 'text-red-600 drop-shadow-[0_0_8px_rgba(255,0,0,0.8)]' : 'text-white'" 
                                  x-text="item.rating || '?'"></span>
                        </div>
                    </div>

                    <div class="p-4 bg-zinc-900/80 border-t border-zinc-800 flex-1">
                        <h3 class="gothic-font text-lg font-bold text-zinc-100 group-hover:text-red-500 transition-colors uppercase leading-tight" x-text="item.title"></h3>
                        <div class="mt-4 flex justify-between items-center text-[10px] mono-tech text-zinc-500">
                            <span x-text="item.typeDisplay"></span>
                            <span x-text="item.year"></span>
                        </div>
                    </div>
                </article>
            </template>
        </main>
    </div>

    <div x-show="modalItem" 
         class="fixed inset-0 z-50 flex items-center justify-center p-4 md:p-8 bg-black/98 backdrop-blur-2xl"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-y-8"
         style="display: none;">
        
        <div class="bg-zinc-950 w-full max-w-6xl rounded-none border border-red-900/50 flex flex-col md:flex-row max-h-[95vh] shadow-[0_0_100px_rgba(139,0,0,0.3)]"
             @click.away="closeModal()">
            
            <div class="md:w-2/5 relative h-64 md:h-auto border-r border-red-900/20">
                <img :src="modalItem?.image" class="w-full h-full object-cover brightness-75">
                <div class="absolute inset-0 bg-gradient-to-r from-transparent to-zinc-950"></div>
            </div>

            <div class="flex-1 p-8 md:p-16 overflow-y-auto readable-text">
                <button @click="closeModal()" class="absolute top-6 right-8 text-zinc-600 hover:text-red-500 transition-colors mono-tech text-xl font-bold">[TERMINATE_LINK]</button>
                
                <header class="mb-12">
                    <span class="mono-tech text-xs text-red-700 tracking-widest uppercase block mb-2" x-text="modalItem?.typeDisplay"></span>
                    <h2 class="gothic-font text-5xl md:text-7xl font-black text-white uppercase tracking-tighter" x-text="modalItem?.title"></h2>
                </header>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-12 border-y border-zinc-900 py-8">
                    <div>
                        <span class="mono-tech text-[9px] text-zinc-600 uppercase block mb-1">Verdict_Score</span>
                        <span class="text-3xl font-black gothic-font text-red-600" x-text="modalItem?.rating + ' / 10'"></span>
                    </div>
                    <div>
                        <span class="mono-tech text-[9px] text-zinc-600 uppercase block mb-1">Data_Source</span>
                        <span class="text-xl font-bold text-zinc-300" x-text="modalItem?.year"></span>
                    </div>
                </div>

                <div class="space-y-12">
                    <section>
                        <h4 class="mono-tech text-[10px] text-red-800 uppercase tracking-widest mb-4 border-b border-red-900/30 pb-2">Inquisitorial_Review</h4>
                        <p class="text-xl text-zinc-200 font-light leading-relaxed whitespace-pre-line italic" x-text="modalItem?.review || 'No review available in current sector.'"></p>
                    </section>
                    
                    <section class="opacity-40">
                        <h4 class="mono-tech text-[10px] text-zinc-600 uppercase tracking-widest mb-4 border-b border-zinc-800 pb-2">Registry_Description</h4>
                        <p class="text-sm leading-relaxed text-zinc-400" x-text="modalItem?.description || 'Access denied.'"></p>
                    </section>
                </div>
            </div>
        </div>
    </div>

    <div x-show="loading" class="fixed inset-0 bg-black z-[100] flex flex-col items-center justify-center">
        <div class="w-16 h-1 w-64 bg-zinc-900 overflow-hidden relative border border-zinc-800">
            <div class="absolute inset-0 bg-red-700 animate-[loading_2s_infinite]" style="width: 40%"></div>
        </div>
        <h3 class="mono-tech text-red-700 text-xs tracking-[1em] uppercase mt-4 animate-pulse">Scanning_Vault...</h3>
    </div>

    <style>
        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(300%); }
        }
    </style>

    <script>
        function mediaApp() {
            return {
                search: '',
                categoryFilter: '',
                sortKey: 'rating-desc',
                modalItem: null,
                items: [],
                loading: true,

                async loadItems() {
                    const files = ['anime_data.json', 'movies_data.json', 'games_data.json', 'books_data.json', 'cartoons_data.json'];
                    try {
                        const results = await Promise.all(files.map(f => fetch(f).then(r => r.ok ? r.json() : []).catch(() => [])));
                        this.items = results.flat().map(item => ({
                            ...item,
                            rating: parseFloat(item.rating) || 0,
                            typeDisplay: this.getType(item.type)
                        }));
                    } finally {
                        this.loading = false;
                    }
                },

                getType(t) {
                    const m = { 'movie': 'CINEMA_RECO', 'show': 'SERIES_RECO', 'anime': 'ANIME_RECO', 'game': 'ARTIFACT_RECO', 'book': 'SCROLL_RECO' };
                    return m[t] || 'UNKNOWN_RECO';
                },

                getCardTierClass(rating) {
                    if (rating === 10) return 'tier-10';
                    if (rating > 10) return 'tier-mega';
                    return '';
                },

                get filteredAndSortedItems() {
                    let f = this.items.filter(i => {
                        return (!this.search || i.title.toLowerCase().includes(this.search.toLowerCase())) &&
                               (!this.categoryFilter || i.type === this.categoryFilter);
                    });

                    return f.sort((a, b) => {
                        if (this.sortKey === 'rating-desc') return b.rating - a.rating;
                        if (this.sortKey === 'year-desc') return (parseInt(b.year) || 0) - (parseInt(a.year) || 0);
                        if (this.sortKey === 'title') return a.title.localeCompare(b.title);
                        return 0;
                    });
                },

                openModal(item) { this.modalItem = item; document.body.style.overflow = 'hidden'; },
                closeModal() { this.modalItem = null; document.body.style.overflow = ''; },
                pickRandomItem() {
                    const l = this.filteredAndSortedItems;
                    if (l.length) this.openModal(l[Math.floor(Math.random() * l.length)]);
                }
            }
        }
    </script>
</body>
</html>
