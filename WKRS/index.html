<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KW0RS // IMPERIAL ARCHIVE</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Playfair+Display:ital,wght@0,400;0,900;1,400&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #d4af37;
            --gold-bright: #f9e2af;
            --imperial-purple: #1a0b2e;
            --deep-black: #050208;
        }

        body {
            background-color: var(--deep-black);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                url("https://www.transparenttextures.com/patterns/dark-matter.png");
            color: #e5e7eb;
            font-family: 'Playfair Display', serif;
            overflow-x: hidden;
        }

        .imperial-font { font-family: 'Cinzel', serif; }
        .mono-tech { font-family: 'Fira Code', monospace; }

        .gold-text {
            background: linear-gradient(to bottom, var(--gold-bright) 20%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.5));
        }

        /* Дефолтная карточка */
        .relic-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative;
        }
        .relic-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--gold);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 20px rgba(212, 175, 55, 0.2);
        }

        /* 👑 ТИР 10/10 — ПОМПЕЗНОЕ СВЯЩЕННОЕ ЗОЛОТО */
        .tier-10 {
            border: 2px solid var(--gold) !important;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.3), inset 0 0 15px rgba(212, 175, 55, 0.1) !important;
            animation: goldPulse 4s ease-in-out infinite alternate;
        }
        .tier-10:hover {
            box-shadow: 0 0 45px rgba(212, 175, 55, 0.7), inset 0 0 25px rgba(212, 175, 55, 0.3) !important;
        }
        @keyframes goldPulse {
            0% { border-color: rgba(212, 175, 55, 0.6); filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.2)); }
            100% { border-color: rgba(255, 226, 175, 1); filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.5)); }
        }

        /* 🌌 ТИР 11/10 и 12/10 — МЕГА ПОМПЕЗНАЯ СИНГУЛЯРНОСТЬ */
        .tier-mega {
            border: 2px solid transparent !important;
            background-image: linear-gradient(rgba(26, 11, 46, 0.9), rgba(5, 2, 8, 0.9)), 
                              linear-gradient(90deg, #d4af37, #ff007f, #7000ff, #00f2ff, #d4af37) !important;
            background-origin: border-box !important;
            background-clip: padding-box, border-box !important;
            background-size: 300% 300% !important;
            animation: megaPlasmaShift 4s linear infinite, megaGlow 3s ease-in-out infinite alternate !important;
        }
        .tier-mega:hover {
            transform: translateY(-15px) scale(1.04) !important;
            filter: drop-shadow(0 0 35px rgba(0, 242, 255, 0.6)) drop-shadow(0 0 50px rgba(255, 0, 127, 0.4)) !important;
        }
        @keyframes megaPlasmaShift {
            0% { background-position: 0% 50%, 0% 50%; }
            50% { background-position: 0% 50%, 100% 50%; }
            100% { background-position: 0% 50%, 0% 50%; }
        }
        @keyframes megaGlow {
            0% { filter: drop-shadow(0 0 15px rgba(255, 0, 127, 0.4)) drop-shadow(0 0 10px rgba(212, 175, 55, 0.2)); }
            100% { filter: drop-shadow(0 0 30px rgba(0, 242, 255, 0.5)) drop-shadow(0 0 25px rgba(112, 0, 255, 0.4)); }
        }

        /* Кастомный скролл */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--deep-black); }
        ::-webkit-scrollbar-thumb { 
            background: linear-gradient(var(--gold), var(--imperial-purple));
            border-radius: 4px;
        }
    </style>
</head>
<body class="antialiased" x-data="mediaApp()" x-init="loadItems()">

    <!-- Угловые орнаменты -->
    <div class="fixed top-0 left-0 w-full h-full opacity-20 pointer-events-none overflow-hidden -z-10">
        <div class="absolute top-0 left-0 w-64 h-64 border-l-2 border-t-2 border-yellow-600/20 m-8"></div>
        <div class="absolute bottom-0 right-0 w-64 h-64 border-r-2 border-b-2 border-yellow-600/20 m-8"></div>
    </div>

    <div class="max-w-[1400px] mx-auto px-6 py-12">
        
        <!-- HEADER -->
        <header class="text-center mb-20">
            <div class="flex justify-center items-center gap-4 mb-4">
                <div class="h-[1px] w-24 bg-gradient-to-l from-yellow-600 to-transparent"></div>
                <span class="imperial-font text-xs tracking-[0.5em] text-yellow-600 uppercase">THE SACRED REGISTRY</span>
                <div class="h-[1px] w-24 bg-gradient-to-r from-yellow-600 to-transparent"></div>
            </div>
            <h1 class="imperial-font text-6xl md:text-8xl font-black mb-4 gold-text tracking-widest">
                KW0RS
            </h1>
            <h2 class="playfair italic text-2xl md:text-3xl text-slate-400 tracking-wide">
                Архив Высших Медиа-Реликвий
            </h2>
            <div class="mt-8 flex justify-center">
                <div class="h-12 w-px bg-gradient-to-b from-yellow-600 to-transparent"></div>
            </div>
        </header>

        <!-- ФИЛЬТРЫ -->
        <section class="mb-16 relic-card rounded-xl p-8 border-t-2 border-yellow-600/50">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
                <!-- Search -->
                <div>
                    <label class="imperial-font text-[10px] tracking-widest text-yellow-600 uppercase mb-3 block">Запрос по названию</label>
                    <input type="text" x-model="search" placeholder="NAME OF THE RECORD..." 
                           class="w-full bg-transparent border-b border-yellow-600/30 py-3 text-xl focus:outline-none focus:border-yellow-500 transition-all placeholder:text-slate-700 italic">
                </div>

                <!-- Category -->
                <div>
                    <label class="imperial-font text-[10px] tracking-widest text-yellow-600 uppercase mb-3 block">Классификация</label>
                    <div class="flex flex-wrap gap-2">
                        <template x-for="cat in ['movie', 'show', 'anime', 'game', 'book']">
                            <button @click="categoryFilter = (categoryFilter === cat ? '' : cat)"
                                    :class="categoryFilter === cat ? 'bg-yellow-600 text-black' : 'border border-yellow-600/30 text-slate-400'"
                                    class="px-4 py-1.5 rounded-full text-[10px] imperial-font transition-all hover:border-yellow-600"
                                    x-text="cat.toUpperCase()"></button>
                        </template>
                    </div>
                </div>

                <!-- Sort -->
                <div class="flex items-end justify-between gap-4">
                    <div class="flex-1">
                        <label class="imperial-font text-[10px] tracking-widest text-yellow-600 uppercase mb-3 block">Вектор хроник</label>
                        <select x-model="sortKey" class="w-full bg-transparent border-b border-yellow-600/30 py-3 text-sm focus:outline-none cursor-pointer">
                            <option value="rating-desc">ВЫСШИЙ СУД (Сначала ТОП)</option>
                            <option value="year-desc">НОВЕЙШИЕ СВИТКИ</option>
                            <option value="title">АЛФАВИТНЫЙ ПЕРЕЧЕНЬ</option>
                        </select>
                    </div>
                    <button @click="pickRandomItem()" class="h-12 w-12 flex items-center justify-center border border-yellow-600/50 hover:bg-yellow-600 hover:text-black transition-all rounded-full">
                        🎲
                    </button>
                </div>
            </div>
        </section>

        <!-- СЕТКА С ДИНАМИЧЕСКИМИ ОБВОДКАМИ -->
        <main class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-10">
            <template x-for="item in filteredAndSortedItems" :key="item.title">
                <!-- Alpine принудительно вешает нужный класс в зависимости от рейтинга -->
                <article @click="openModal(item)" 
                         :class="getCardTierClass(item.rating)" 
                         class="relic-card overflow-hidden flex flex-col h-full cursor-pointer">
                    
                    <!-- Media Container -->
                    <div class="relative aspect-[3/4] overflow-hidden bg-slate-950">
                        <img :src="item.image || 'https://via.placeholder.com/600x800'" 
                             class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110 grayscale-[20%] group-hover:grayscale-0"
                             loading="lazy">
                        
                        <!-- Floating Score -->
                        <div class="absolute top-0 left-0 p-4">
                            <div class="backdrop-blur-md bg-black/80 border w-12 h-12 rounded-full flex items-center justify-center"
                                 :class="item.rating >= 10 ? 'border-yellow-400' : 'border-white/15'">
                                <span class="imperial-font text-sm font-black" 
                                      :class="item.rating >= 10 ? 'gold-text' : 'text-white'" 
                                      x-text="item.rating || '?'"></span>
                            </div>
                        </div>

                        <!-- Эффект нимба для абсолютных богов (рейтинг > 10) -->
                        <template x-if="item.rating > 10">
                            <div class="absolute inset-0 bg-gradient-to-t from-purple-900/40 via-transparent to-transparent pointer-events-none"></div>
                        </template>
                    </div>

                    <!-- Description Area -->
                    <div class="p-6 relative bg-black/40 flex-1 flex flex-col justify-between">
                        <div>
                            <span class="imperial-font text-[9px] tracking-widest text-yellow-600 uppercase" x-text="item.typeDisplay"></span>
                            <h3 class="playfair text-2xl font-black text-white mt-1 group-hover:text-yellow-400 transition-all line-clamp-2" x-text="item.title"></h3>
                        </div>
                        
                        <div class="mt-6 flex justify-between items-center opacity-60">
                            <span class="mono-tech text-[10px]" x-text="item.year"></span>
                            <div class="h-px flex-1 mx-4 bg-yellow-600/20"></div>
                            <span class="imperial-font text-[9px] tracking-tighter uppercase truncate max-w-[80px]" x-text="item.genres[0] || 'Свиток'"></span>
                        </div>
                    </div>
                </article>
            </template>
        </main>
    </div>

    <!-- МОДАЛКА (ИМПЕРСКИЙ РАЗДЕЛ) -->
    <div x-show="modalItem" 
         class="fixed inset-0 z-50 flex items-center justify-center p-4 md:p-12 bg-black/95 backdrop-blur-xl"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 scale-110"
         x-transition:leave="transition ease-in duration-200"
         style="display: none;">
        
        <div class="bg-gradient-to-b from-slate-900 to-black w-full max-w-6xl rounded-2xl overflow-hidden shadow-[0_0_100px_rgba(212,175,55,0.15)] border border-yellow-600/30 flex flex-col md:flex-row max-h-[90vh]"
             @click.away="closeModal()">
            
            <div class="md:w-2/5 relative h-64 md:h-auto overflow-hidden bg-black">
                <img :src="modalItem?.image" class="w-full h-full object-cover">
            </div>

            <div class="flex-1 p-8 md:p-12 overflow-y-auto">
                <div class="flex justify-between items-start mb-8">
                    <div>
                        <span class="imperial-font text-xs text-yellow-600 tracking-[0.3em] uppercase block mb-2" x-text="modalItem?.typeDisplay"></span>
                        <h2 class="playfair text-4xl md:text-5xl font-black text-white italic" x-text="modalItem?.title"></h2>
                    </div>
                    <button @click="closeModal()" class="text-yellow-600 hover:text-white transition-colors imperial-font text-2xl">[ X ]</button>
                </div>

                <div class="grid grid-cols-3 gap-4 mb-10">
                    <div class="border-l border-yellow-600/30 pl-4">
                        <span class="mono-tech text-[10px] text-slate-500 uppercase block">Вердикт</span>
                        <span class="text-2xl font-black gold-text" x-text="modalItem?.rating + ' / 10'"></span>
                    </div>
                    <div class="border-l border-yellow-600/30 pl-4">
                        <span class="mono-tech text-[10px] text-slate-500 uppercase block">Эпоха</span>
                        <span class="text-2xl font-black text-white" x-text="modalItem?.year"></span>
                    </div>
                    <div class="border-l border-yellow-600/30 pl-4">
                        <span class="mono-tech text-[10px] text-slate-500 uppercase block">Индекс</span>
                        <span class="text-2xl font-black text-amber-500 uppercase">SAFE</span>
                    </div>
                </div>

                <div class="space-y-8">
                    <section>
                        <h4 class="imperial-font text-xs text-yellow-600 border-b border-yellow-600/20 pb-2 mb-4 uppercase tracking-[0.2em]">Мнение // Рецензия</h4>
                        <p class="playfair text-xl text-slate-200 leading-relaxed italic" x-text="modalItem?.review || 'Рецензия отсутствует.'"></p>
                    </section>
                    <section class="opacity-50">
                        <h4 class="imperial-font text-xs text-slate-500 border-b border-slate-800 pb-2 mb-4 uppercase tracking-[0.2em]">Суть // Описание</h4>
                        <p class="mono-tech text-sm leading-relaxed text-slate-400" x-text="modalItem?.description || 'Нет описания.'"></p>
                    </section>
                </div>
            </div>
        </div>
    </div>

    <!-- Загрузчик -->
    <div x-show="loading" class="fixed inset-0 bg-black z-[100] flex flex-col items-center justify-center">
        <div class="w-16 h-16 border-t-2 border-b-2 border-yellow-600 rounded-full animate-spin mb-4"></div>
        <h3 class="imperial-font text-yellow-600 text-xs tracking-[0.5em] uppercase animate-pulse">Открытие Врат Архива...</h3>
    </div>

    <script>
        function mediaApp() {
            return {
                search: '',
                categoryFilter: '',
                sortKey: 'rating-desc',
                modalItem: null,
                items: [],
                loading: true,

                async loadItems() {
                    const files = ['anime_data.json', 'movies_data.json', 'games_data.json', 'books_data.json', 'cartoons_data.json'];
                    try {
                        const results = await Promise.all(files.map(f => fetch(f).then(r => r.ok ? r.json() : []).catch(() => [])));
                        this.items = results.flat().map(item => ({
                            ...item,
                            rating: parseFloat(item.rating) || 0,
                            typeDisplay: this.getType(item.type)
                        }));
                    } finally {
                        this.loading = false;
                    }
                },

                getType(t) {
                    const m = { 'movie': 'МАНУСКРИПТ: КИНО', 'show': 'МАНУСКРИПТ: СЕРИАЛ', 'anime': 'МАНУСКРИПТ: АНИМЕ', 'game': 'АРТЕФАКТ: ИГРА', 'book': 'СВИТОК: ЛИТЕРАТУРА', 'cartoon': 'МУЛЬТФИЛЬМ' };
                    return m[t] || 'ОБЪЕКТ РЕЕСТРА';
                },

                // Динамическая раздача имперских статусов рамкам
                getCardTierClass(rating) {
                    if (rating === 10) {
                        return 'tier-10';
                    }
                    if (rating > 10) {
                        return 'tier-mega';
                    }
                    return '';
                },

                get filteredAndSortedItems() {
                    let f = this.items.filter(i => {
                        return (!this.search || i.title.toLowerCase().includes(this.search.toLowerCase())) &&
                               (!this.categoryFilter || i.type === this.categoryFilter);
                    });

                    return f.sort((a, b) => {
                        if (this.sortKey === 'rating-desc') return b.rating - a.rating;
                        if (this.sortKey === 'year-desc') return (parseInt(b.year) || 0) - (parseInt(a.year) || 0);
                        if (this.sortKey === 'title') return a.title.localeCompare(b.title);
                        return 0;
                    });
                },

                openModal(item) { this.modalItem = item; document.body.style.overflow = 'hidden'; },
                closeModal() { this.modalItem = null; document.body.style.overflow = ''; },
                pickRandomItem() {
                    const l = this.filteredAndSortedItems;
                    if (l.length) this.openModal(l[Math.floor(Math.random() * l.length)]);
                }
            }
        }
    </script>
</body>
</html>
