<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KW0RS ARCHIVE // MEDIA REGISTRY</title>
    
    <!-- Подключаем Tailwind и Alpine -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- Шрифты: жесткий геометрический для интерфейса и читаемый для текстов -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #090a0f;
            color: #f1f5f9;
            -webkit-font-smoothing: antialiased;
        }
        /* Тонкий кастомный скроллбар, чтобы не ломать верстку */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #090a0f; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #ea580c; }
    </style>
</head>
<body class="font-sans antialiased text-slate-200" x-data="mediaApp()" x-init="loadItems()">

    <!-- Верхний технический бордер -->
    <div class="h-1 w-full bg-gradient-to-r from-orange-600 via-amber-500 to-transparent"></div>

    <div class="max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8 py-10">
        
        <!-- HEADER -->
        <header class="mb-12 flex flex-col md:flex-row justify-between items-start md:items-end gap-6 pb-6 border-b border-slate-800">
            <div>
                <div class="flex items-center gap-3 mb-2">
                    <span class="font-display font-bold text-xs tracking-widest text-orange-500 uppercase px-2 py-0.5 bg-orange-500/10 border border-orange-500/20">CORE_V2.6</span>
                    <span class="font-mono text-xs text-slate-500">INDEXED_RECORDS</span>
                </div>
                <h1 class="font-display text-4xl sm:text-5xl font-bold tracking-tight text-white uppercase">
                    KW0RS <span class="font-light text-slate-500">//</span> MEDIA INDEX
                </h1>
            </div>
            
            <!-- Инфо-панель -->
            <div class="flex items-center gap-6 font-mono text-xs text-slate-400 bg-slate-900/40 p-3 border border-slate-800 rounded">
                <div>TOTAL: <span class="text-white font-medium" x-text="items.length"></span></div>
                <div class="w-px h-4 bg-slate-800"></div>
                <div>FILTERED: <span class="text-orange-500 font-medium" x-text="filteredAndSortedItems.length"></span></div>
            </div>
        </header>

        <!-- ПАНЕЛЬ ФИЛЬТРОВ (Строгая модульная сетка) -->
        <section class="mb-8 bg-slate-900/20 border border-slate-800/80 rounded overflow-hidden">
            <div class="p-6 grid grid-cols-1 md:grid-cols-12 gap-4">
                
                <!-- Поиск (Занимает 5 колонок) -->
                <div class="md:col-span-5">
                    <label class="block font-mono text-[11px] uppercase tracking-wider text-slate-400 mb-2">01 // Идентификатор_названия</label>
                    <div class="relative">
                        <input type="text" x-model="search" placeholder="Поиск по названию реестра..." 
                               class="w-full bg-slate-950/60 border border-slate-800 rounded px-4 py-2.5 text-sm font-medium text-white placeholder-slate-600 focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500/30 transition-all">
                    </div>
                </div>

                <!-- Категория (3 колонки) -->
                <div class="md:col-span-3">
                    <label class="block font-mono text-[11px] uppercase tracking-wider text-slate-400 mb-2">02 // Классификация</label>
                    <select x-model="categoryFilter" 
                            class="w-full bg-slate-950/60 border border-slate-800 rounded px-3 py-2.5 text-sm font-medium text-white focus:outline-none focus:border-orange-500 transition-all appearance-none cursor-pointer">
                        <option value="">Все категории</option>
                        <option value="movie">Кинематограф</option>
                        <option value="show">Сериалы</option>
                        <option value="anime">Аниме-индустрия</option>
                        <option value="game">Интерактивный софт (Игры)</option>
                        <option value="book">Литература / Чтиво</option>
                        <option value="cartoon">Мультипликация</option>
                    </select>
                </div>

                <!-- Сортировка (4 колонки) -->
                <div class="md:col-span-4">
                    <label class="block font-mono text-[11px] uppercase tracking-wider text-slate-400 mb-2">03 // Вектор сортировки</label>
                    <select x-model="sortKey" 
                            class="w-full bg-slate-950/60 border border-slate-800 rounded px-3 py-2.5 text-sm font-medium text-white focus:outline-none focus:border-orange-500 transition-all appearance-none cursor-pointer">
                        <option value="rating-desc">Рейтинг: По убыванию [MAX]</option>
                        <option value="rating-asc">Рейтинг: По возрастанию [MIN]</option>
                        <option value="year-desc">Хронология: Сначала новые</option>
                        <option value="year-asc">Хронология: Сначала старые</option>
                        <option value="title">Алфавитный порядок [A-Z]</option>
                    </select>
                </div>
            </div>

            <!-- Дополнительные утилиты управления -->
            <div class="px-6 py-4 bg-slate-950/40 border-t border-slate-800/60 flex flex-wrap justify-between items-center gap-4">
                <div class="flex items-center gap-4">
                    <!-- Слайдер минимального рейтинга -->
                    <div class="flex items-center gap-3">
                        <span class="font-mono text-[11px] text-slate-400 uppercase">Рейтинг от:</span>
                        <input type="range" x-model.number="minRating" min="0" max="10" step="0.5" class="w-24 accent-orange-500 h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer">
                        <span class="font-mono text-xs font-bold text-orange-500" x-text="minRating || '0'"></span>
                    </div>
                </div>

                <div class="flex gap-3">
                    <button @click="pickRandomItem()" class="font-mono text-xs font-bold tracking-wider uppercase border border-slate-700 hover:border-orange-500 hover:bg-orange-500/5 px-4 py-2 transition-all rounded">
                        [ RANDOM_PICK ]
                    </button>
                    <button @click="clearFilters()" class="font-mono text-xs font-bold tracking-wider uppercase text-slate-400 hover:text-white px-3 py-2 transition-all">
                        Очистить
                    </button>
                </div>
            </div>
        </section>

        <!-- СЕТКА КАРТОЧЕК -->
        <main class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4" role="main">
            <template x-for="item in filteredAndSortedItems" :key="item.title + '-' + item.year">
                <article @click="openModal(item)" 
                         class="bg-slate-900/40 border border-slate-800/80 rounded p-2 hover:border-slate-600 transition-all duration-300 cursor-pointer group flex flex-col h-full relative">
                    
                    <!-- Постер / Изображение -->
                    <div class="relative aspect-[2/3] w-full bg-slate-950 rounded overflow-hidden mb-3">
                        <img :src="item.image || 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=400&auto=format&fit=crop'" 
                             class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
                             loading="lazy"
                             @error="$el.src='https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=400&auto=format&fit=crop'">
                        
                        <!-- Абсолютный бейдж рейтинга -->
                        <div class="absolute top-2 right-2 backdrop-blur-md bg-slate-950/80 border px-2 py-0.5 rounded font-mono text-[11px] font-bold"
                             :class="item.rating >= 8 ? 'text-emerald-400 border-emerald-500/20' : (item.rating >= 5 ? 'text-amber-400 border-amber-500/20' : 'text-rose-400 border-rose-500/20')">
                            <span x-text="item.rating ? item.rating.toFixed(1) : 'Н/Д'"></span>
                        </div>
                    </div>

                    <!-- Метаданные -->
                    <div class="flex flex-col flex-1 px-1 py-1">
                        <span class="font-mono text-[10px] uppercase text-slate-500 mb-1" x-text="item.typeDisplay"></span>
                        <!-- Название (Обрезается красиво, без выползания) -->
                        <h3 class="text-sm font-semibold text-white group-hover:text-orange-500 transition-colors line-clamp-2 tracking-tight uppercase mb-2" x-text="item.title"></h3>
                        
                        <!-- Год в самом низу -->
                        <div class="mt-auto pt-2 border-t border-slate-800/50 flex justify-between items-center">
                            <span class="font-mono text-[11px] text-slate-400" x-text="item.year"></span>
                            <span class="text-[10px] text-slate-500" x-show="item.genres.length" x-text="item.genres[0]"></span>
                        </div>
                    </div>
                </article>
            </template>
        </main>

        <!-- Пустое состояние -->
        <div x-show="filteredAndSortedItems.length === 0" class="text-center py-24 border border-dashed border-slate-800 rounded">
            <p class="font-mono text-sm text-slate-500 uppercase tracking-widest mb-4">НЕТ СОВПАДЕНИЙ ПО ДАННОМУ ЗАПРОСУ</p>
            <button @click="clearFilters()" class="text-xs font-mono text-orange-500 hover:underline">[ СБРОСИТЬ ФИЛЬТРАЦИЮ ]</button>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО (Индустриальный оверлей) -->
    <div x-show="modalItem" 
         class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/90 backdrop-blur-sm"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0"
         x-transition:leave="transition ease-in duration-150"
         style="display: none;">
        
        <div class="bg-slate-900 border border-slate-800 w-full max-w-5xl rounded overflow-hidden shadow-2xl flex flex-col md:flex-row max-h-[90vh]"
             @click.away="closeModal()">
            
            <!-- Левая часть (Постер + статы) -->
            <div class="w-full md:w-2/5 bg-slate-950 p-6 flex flex-col justify-between border-b md:border-b-0 md:border-r border-slate-800">
                <div>
                    <img :src="modalItem?.image" class="w-full aspect-[2/3] object-cover rounded border border-slate-800 shadow-lg mb-6">
                    <div class="grid grid-cols-2 gap-2 font-mono">
                        <div class="p-3 bg-slate-900/60 border border-slate-800 rounded">
                            <span class="text-[10px] text-slate-500 block uppercase">РЕЙТИНГ</span>
                            <span class="text-xl font-bold text-white" x-text="modalItem?.rating ? modalItem.rating.toFixed(1) : 'Н/Д'"></span>
                        </div>
                        <div class="p-3 bg-slate-900/60 border border-slate-800 rounded">
                            <span class="text-[10px] text-slate-500 block uppercase">РЕЛИЗ</span>
                            <span class="text-xl font-bold text-white" x-text="modalItem?.year"></span>
                        </div>
                    </div>
                </div>
                
                <div class="mt-6">
                    <span class="font-mono text-[10px] text-slate-500 block mb-2 uppercase">ТЕГИ_КАТЕГОРИИ</span>
                    <div class="flex flex-wrap gap-1.5">
                        <template x-for="genre in modalItem?.genres" :key="genre">
                            <span class="text-xs bg-slate-900 px-2.5 py-1 rounded text-slate-300 border border-slate-800" x-text="genre"></span>
                        </template>
                    </div>
                </div>
            </div>

            <!-- Правая часть (Тексты и логи) -->
            <div class="flex-1 p-6 sm:p-8 overflow-y-auto flex flex-col justify-between">
                <div>
                    <div class="flex justify-between items-start gap-4 mb-4">
                        <div>
                            <span class="font-mono text-xs text-orange-500 uppercase font-bold tracking-wider" x-text="modalItem?.typeDisplay"></span>
                            <h2 class="text-2xl sm:text-3xl font-bold text-white uppercase tracking-tight mt-1" x-text="modalItem?.title"></h2>
                        </div>
                        <button @click="closeModal()" class="font-mono text-slate-500 hover:text-white transition-colors text-sm bg-slate-950 px-2 py-1 rounded border border-slate-800">ESC_✖</button>
                    </div>

                    <!-- Переключатели контента -->
                    <div class="flex border-b border-slate-800 mb-6">
                        <button @click="showReview = true" 
                                class="px-4 py-2 font-mono text-xs uppercase tracking-wider border-b-2 transition-all"
                                :class="showReview ? 'border-orange-500 text-white font-bold bg-slate-800/30' : 'border-transparent text-slate-400 hover:text-white'">
                            [ Мнение_Рецензия ]
                        </button>
                        <button @click="showReview = false" 
                                class="px-4 py-2 font-mono text-xs uppercase tracking-wider border-b-2 transition-all"
                                :class="!showReview ? 'border-orange-500 text-white font-bold bg-slate-800/30' : 'border-transparent text-slate-400 hover:text-white'">
                            [ Сюжет_Описание ]
                        </button>
                    </div>

                    <!-- Блок с текстом -->
                    <div class="prose prose-invert max-w-none">
                        <div x-show="showReview">
                            <p class="text-slate-300 text-base leading-relaxed whitespace-pre-line font-serif italic" x-text="modalItem?.review || 'Рецензия на данный объект не сформирована в базе данных.'"></p>
                        </div>
                        <div x-show="!showReview">
                            <p class="text-slate-400 text-sm leading-relaxed" x-text="modalItem?.description || 'Описание отсутствует или заблокировано.'"></p>
                        </div>
                    </div>
                </div>

                <div class="mt-8 pt-4 border-t border-slate-800 flex justify-end">
                    <button @click="closeModal()" class="w-full sm:w-auto bg-slate-950 hover:bg-slate-800 border border-slate-800 hover:border-slate-700 text-white font-mono text-xs uppercase px-6 py-3 transition-all rounded">
                        Закрыть сессию
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Загрузчик -->
    <div x-show="loading" class="fixed inset-0 bg-[#090a0f] z-[100] flex flex-col items-center justify-center gap-4">
        <div class="h-1 w-48 bg-slate-900 rounded-full overflow-hidden relative border border-slate-800">
            <div class="absolute h-full bg-orange-500 top-0 left-0 animate-[pulse_1.5s_infinite]" style="width: 60%"></div>
        </div>
        <p class="font-mono text-[11px] text-slate-500 tracking-widest uppercase">ЧТЕНИЕ_ФАЙЛОВ_ДАННЫХ...</p>
    </div>

    <script>
        function mediaApp() {
            return {
                search: '',
                categoryFilter: '',
                sortKey: 'rating-desc',
                minRating: 0,
                modalItem: null,
                items: [],
                loading: true,
                showReview: true,

                async loadItems() {
                    const fileNames = ['anime_data.json', 'movies_data.json', 'games_data.json', 'books_data.json', 'cartoons_data.json'];
                    this.loading = true;
                    
                    try {
                        // Чистый параллельный фетч без лишней воды
                        const fetches = fileNames.map(file => 
                            fetch(file)
                                .then(res => res.ok ? res.json() : [])
                                .catch(() => [])
                        );
                        
                        const results = await Promise.all(fetches);
                        const rawItems = results.flat();
                        
                        this.items = rawItems.map(item => {
                            const r = parseFloat(item.rating);
                            return {
                                title: item.title || 'НЕИЗВЕСТНЫЙ_ОБЪЕКТ',
                                type: item.type || 'unknown',
                                typeDisplay: this.getTypeDisplay(item.type),
                                year: item.year || 'Н/Д',
                                rating: !isNaN(r) ? r : null,
                                genres: Array.isArray(item.genres) ? item.genres : [],
                                description: item.description || '',
                                review: item.review || '',
                                image: item.image || null
                            };
                        });
                    } catch (e) {
                        console.error("DATA_FETCH_ERROR //", e);
                    } finally {
                        this.loading = false;
                    }
                },

                getTypeDisplay(type) {
                    const map = {
                        'movie': 'КИНЕМАТОГРАФ',
                        'show': 'СЕРИАЛ',
                        'anime': 'АНИМЕ',
                        'game': 'ИНТЕРАКТИВНЫЙ_СОФТ',
                        'book': 'ЛИТЕРАТУРА',
                        'cartoon': 'МУЛЬТФИЛЬМ'
                    };
                    return map[type] || 'ОБЪЕКТ_РЕЕСТРА';
                },

                get filteredAndSortedItems() {
                    let filtered = this.items.filter(item => {
                        const matchSearch = !this.search || item.title.toLowerCase().includes(this.search.toLowerCase());
                        const matchCat = !this.categoryFilter || item.type === this.categoryFilter;
                        const matchRating = !this.minRating || (item.rating !== null && item.rating >= this.minRating);
                        return matchSearch && matchCat && matchRating;
                    });

                    return filtered.sort((a, b) => {
                        const rA = a.rating === null ? -1 : a.rating;
                        const rB = b.rating === null ? -1 : b.rating;
                        
                        switch (this.sortKey) {
                            case 'rating-asc':   return rA - rB;
                            case 'rating-desc':  return rB - rA;
                            case 'year-asc':     return (parseInt(a.year) || 0) - (parseInt(b.year) || 0);
                            case 'year-desc':    return (parseInt(b.year) || 0) - (parseInt(a.year) || 0);
                            case 'title':        return a.title.localeCompare(b.title, 'ru');
                            default:             return 0;
                        }
                    });
                },

                openModal(item) {
                    this.modalItem = item;
                    this.showReview = !!item.review;
                    document.body.style.overflow = 'hidden';
                },

                closeModal() {
                    this.modalItem = null;
                    document.body.style.overflow = '';
                },

                clearFilters() {
                    this.search = '';
                    this.categoryFilter = '';
                    this.sortKey = 'rating-desc';
                    this.minRating = 0;
                },

                pickRandomItem() {
                    const currentList = this.filteredAndSortedItems;
                    if (currentList.length > 0) {
                        const random = currentList[Math.floor(Math.random() * currentList.length)];
                        this.openModal(random);
                    }
                }
            }
        }
    </script>
</body>
</html>
